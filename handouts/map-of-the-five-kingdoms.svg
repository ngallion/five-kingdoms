<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" font-family="Georgia, 'Times New Roman', serif">
  <!-- Parchment ground -->
  <rect x="0" y="0" width="1000" height="820" fill="#efe4cc"/>
  <rect x="14" y="14" width="972" height="792" fill="none" stroke="#7a6a4f" stroke-width="3"/>
  <rect x="22" y="22" width="956" height="776" fill="none" stroke="#7a6a4f" stroke-width="1"/>

  <!-- Edge-of-the-world washes -->
  <!-- Ice, north -->
  <g stroke="#9aa7ad" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 60 52 l 24 -14 l 24 14 M 130 48 l 20 -12 l 20 12 M 640 50 l 22 -13 l 22 13 M 760 55 l 20 -12 l 20 12 M 860 48 l 22 -13 l 22 13 M 300 45 l 20 -12 l 20 12"/>
  </g>
  <text x="500" y="52" text-anchor="middle" font-size="15" font-style="italic" fill="#8a9499">— the ice, unended —</text>

  <!-- Badlands, east -->
  <g stroke="#a58e6f" stroke-width="1.2" fill="none" opacity="0.8">
    <path d="M 930 260 q 8 -10 16 0 M 945 300 q 8 -10 16 0 M 928 345 q 8 -10 16 0 M 948 420 q 8 -10 16 0 M 932 470 q 8 -10 16 0"/>
  </g>
  <text x="952" y="380" font-size="14" font-style="italic" fill="#9c8666" transform="rotate(90 952 380)" text-anchor="middle">the badlands, untracked</text>

  <!-- Vesper Sea, southwest -->
  <g stroke="#6b8ca3" stroke-width="1.5" fill="none" opacity="0.85">
    <path d="M 50 640 q 12 -8 24 0 q 12 8 24 0 M 45 685 q 12 -8 24 0 q 12 8 24 0 q 12 -8 24 0 M 60 730 q 12 -8 24 0 q 12 8 24 0 M 140 760 q 12 -8 24 0 q 12 8 24 0 M 45 590 q 12 -8 24 0"/>
  </g>
  <text x="118" y="628" text-anchor="middle" font-size="19" font-style="italic" fill="#5d7f96" letter-spacing="2">THE</text>
  <text x="118" y="652" text-anchor="middle" font-size="19" font-style="italic" fill="#5d7f96" letter-spacing="2">VESPER SEA</text>
  <text x="118" y="674" text-anchor="middle" font-size="11" font-style="italic" fill="#7d97a8">none sail out</text>

  <!-- Luminar coastline -->
  <path d="M 90 480 q 40 20 55 55 q 15 35 50 50 q 40 15 55 55 q 12 34 45 55 q 30 18 65 22"
        fill="none" stroke="#5d7f96" stroke-width="2.5"/>
  <path d="M 100 470 q 38 18 52 52 q 15 33 48 48 q 38 16 53 52 q 12 32 44 52 q 28 17 62 21"
        fill="none" stroke="#5d7f96" stroke-width="1" opacity="0.6"/>
  <!-- a few islands -->
  <g fill="none" stroke="#5d7f96" stroke-width="1.5">
    <ellipse cx="150" cy="565" rx="14" ry="6"/>
    <ellipse cx="205" cy="640" rx="10" ry="5"/>
    <ellipse cx="150" cy="710" rx="16" ry="6"/>
  </g>

  <!-- ================= ROADS ================= -->
  <!-- The Girdle: rim road through the five capitals -->
  <path d="M 500 120 Q 680 180 766 313 Q 810 480 665 627 Q 500 700 335 627 Q 195 480 234 313 Q 320 180 500 120 Z"
        fill="none" stroke="#8a4a32" stroke-width="2.5" stroke-dasharray="10 6" opacity="0.85"/>
  <text x="500" y="736" text-anchor="middle" font-size="13" font-style="italic" fill="#8a4a32">the Girdle — the rim road, called the Round by the Wayfarers</text>

  <!-- Spoke roads: capital toward the center, stopping dead at the March -->
  <g stroke="#8a4a32" stroke-width="3" stroke-dasharray="4 5" opacity="0.7">
    <line x1="500" y1="132" x2="500" y2="296"/>
    <line x1="755" y1="322" x2="600" y2="368"/>
    <line x1="656" y1="617" x2="565" y2="472"/>
    <line x1="344" y1="617" x2="435" y2="472"/>
    <line x1="245" y1="322" x2="400" y2="368"/>
  </g>
  <!-- the Stubs: dead ends -->
  <g stroke="#8a4a32" stroke-width="2.5" opacity="0.8">
    <line x1="488" y1="296" x2="512" y2="296"/>
    <line x1="596" y1="358" x2="604" y2="378"/>
    <line x1="574" y1="466" x2="556" y2="478"/>
    <line x1="426" y1="466" x2="444" y2="478"/>
    <line x1="396" y1="358" x2="404" y2="378"/>
  </g>
  <text x="500" y="282" text-anchor="middle" font-size="11" font-style="italic" fill="#8a4a32">the old roads stop dead</text>

  <!-- ================= THE HOLLOW MARCH ================= -->
  <path d="M 500 318 q 52 -6 78 30 q 30 32 12 72 q -10 42 -55 52 q -48 14 -82 -14 q -38 -24 -34 -68 q 2 -44 36 -60 q 22 -12 45 -12 Z"
        fill="#e2d3b4" stroke="#6d5c41" stroke-width="1.5" stroke-dasharray="2 4"/>
  <g stroke="#6d5c41" stroke-width="0.7" opacity="0.35">
    <line x1="452" y1="352" x2="560" y2="352"/>
    <line x1="436" y1="380" x2="576" y2="380"/>
    <line x1="430" y1="408" x2="580" y2="408"/>
    <line x1="438" y1="436" x2="572" y2="436"/>
    <line x1="460" y1="462" x2="552" y2="462"/>
  </g>
  <text x="503" y="392" text-anchor="middle" font-size="17" letter-spacing="3" fill="#6d5c41">THE HOLLOW</text>
  <text x="503" y="414" text-anchor="middle" font-size="17" letter-spacing="3" fill="#6d5c41">MARCH</text>
  <text x="503" y="438" text-anchor="middle" font-size="11" font-style="italic" fill="#6d5c41">uncharted — no two maps agree</text>

  <!-- ================= KINGDOMS ================= -->

  <!-- FORGEHOLM, north -->
  <g stroke="#4a3f30" stroke-width="2" fill="none">
    <path d="M 360 105 l 16 -24 l 16 24 M 398 98 l 18 -28 l 18 28 M 440 92 l 20 -32 l 20 32 M 486 90 l 20 -32 l 20 32 M 532 94 l 18 -28 l 18 28 M 574 100 l 16 -24 l 16 24 M 614 108 l 14 -20 l 14 20"/>
  </g>
  <circle cx="500" cy="120" r="6" fill="#3c3222"/>
  <rect x="497" y="108" width="6" height="8" fill="#3c3222"/>
  <text x="500" y="150" text-anchor="middle" font-size="24" letter-spacing="4" fill="#3c3222">FORGEHOLM</text>
  <text x="500" y="169" text-anchor="middle" font-size="13" font-style="italic" fill="#6d5c41">the Ironspine · ✶ Kaldrum, the forge-city</text>

  <!-- VERITAS, east -->
  <g stroke="#4a3f30" stroke-width="1.5" fill="none">
    <path d="M 800 250 h 44 M 796 262 h 52 M 800 274 h 44"/>
    <circle cx="852" cy="300" r="7"/>
    <path d="M 852 293 v -10 M 848 285 l 4 -4 l 4 4"/>
  </g>
  <circle cx="766" cy="313" r="6" fill="#3c3222"/>
  <text x="832" y="340" text-anchor="middle" font-size="24" letter-spacing="4" fill="#3c3222">VERITAS</text>
  <text x="832" y="359" text-anchor="middle" font-size="13" font-style="italic" fill="#6d5c41">the Tablelands · ✶ Meridian</text>
  <!-- salt flats -->
  <g stroke="#8f8672" stroke-width="0.8" opacity="0.7">
    <path d="M 812 390 h 60 M 822 400 h 44 M 816 410 h 52"/>
  </g>

  <!-- SOPHARA, south: the Meander, braiding toward the fens -->
  <path d="M 648 640 q -20 24 -48 30 q -30 6 -48 24 M 650 652 q -14 26 -44 34 q -26 8 -40 22"
        fill="none" stroke="#6b8ca3" stroke-width="1.8"/>
  <circle cx="665" cy="627" r="6" fill="#3c3222"/>
  <text x="712" y="682" text-anchor="middle" font-size="24" letter-spacing="4" fill="#3c3222">SOPHARA</text>
  <text x="712" y="701" text-anchor="middle" font-size="13" font-style="italic" fill="#6d5c41">the Meander country · ✶ the Stoa</text>

  <!-- LUMINAR, west coast -->
  <circle cx="335" cy="627" r="6" fill="#3c3222"/>
  <text x="300" y="672" text-anchor="middle" font-size="24" letter-spacing="4" fill="#3c3222">LUMINAR</text>
  <text x="300" y="691" text-anchor="middle" font-size="13" font-style="italic" fill="#6d5c41">the Glassreach · ✶ Prismere</text>

  <!-- AGORAN, northwest -->
  <g stroke="#7c7a54" stroke-width="1.2" fill="none" opacity="0.9">
    <path d="M 160 250 q 4 -8 8 0 M 178 244 q 4 -8 8 0 M 196 252 q 4 -8 8 0 M 168 270 q 4 -8 8 0 M 190 268 q 4 -8 8 0 M 152 288 q 4 -8 8 0 M 176 290 q 4 -8 8 0 M 200 284 q 4 -8 8 0"/>
  </g>
  <circle cx="234" cy="313" r="6" fill="#3c3222"/>
  <text x="196" y="345" text-anchor="middle" font-size="24" letter-spacing="4" fill="#3c3222">AGORAN</text>
  <text x="196" y="364" text-anchor="middle" font-size="13" font-style="italic" fill="#6d5c41">the Granary · ✶ Commonhold</text>

  <!-- ================= BORDER WILDS ================= -->
  <text x="340" y="185" text-anchor="middle" font-size="13" font-style="italic" fill="#7a6a4f">the Thornfell</text>
  <text x="672" y="185" text-anchor="middle" font-size="13" font-style="italic" fill="#7a6a4f">the Screes</text>
  <text x="800" y="500" text-anchor="middle" font-size="13" font-style="italic" fill="#7a6a4f">the Hush</text>
  <text x="490" y="692" text-anchor="middle" font-size="13" font-style="italic" fill="#7a6a4f">the Sighing Fens</text>
  <text x="236" y="472" text-anchor="middle" font-size="13" font-style="italic" fill="#7a6a4f">the Chalklands</text>

  <!-- ================= CARTOUCHE & COMPASS ================= -->
  <g>
    <rect x="46" y="52" width="240" height="96" fill="#e9dcbe" stroke="#7a6a4f" stroke-width="1.5"/>
    <rect x="51" y="57" width="230" height="86" fill="none" stroke="#7a6a4f" stroke-width="0.8"/>
    <text x="166" y="84" text-anchor="middle" font-size="19" letter-spacing="2" fill="#3c3222">THE FIVE KINGDOMS</text>
    <text x="166" y="106" text-anchor="middle" font-size="12" font-style="italic" fill="#6d5c41">as the roads once ran</text>
    <text x="166" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#8a7a5c">redrawn from the Round of the Wayfair</text>
  </g>

  <g transform="translate(905 105)" stroke="#4a3f30" fill="#4a3f30">
    <line x1="0" y1="-38" x2="0" y2="38" stroke-width="1.5"/>
    <line x1="-38" y1="0" x2="38" y2="0" stroke-width="1.5"/>
    <path d="M 0 -38 l 6 14 l -6 -4 l -6 4 Z"/>
    <text x="0" y="-44" text-anchor="middle" font-size="14" stroke="none">N</text>
  </g>

  <!-- Scale note -->
  <g transform="translate(700 770)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#4a3f30" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#4a3f30" stroke-width="1.5"/>
    <line x1="90" y1="-4" x2="90" y2="4" stroke="#4a3f30" stroke-width="1"/>
    <line x1="180" y1="-5" x2="180" y2="5" stroke="#4a3f30" stroke-width="1.5"/>
    <text x="90" y="18" text-anchor="middle" font-size="11" font-style="italic" fill="#6d5c41">roughly three weeks by wagon, gate to gate</text>
  </g>
  <text x="70" y="775" font-size="10.5" font-style="italic" fill="#8a7a5c">Distances near the center are disputed. All of them.</text>
</svg>
